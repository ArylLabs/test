<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="navyBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- M with World Globe -->
  <g transform="translate(50, 55)">
    <!-- Left leg of M -->
    <path d="M -22 -20 L -22 20 L -15 20 L -15 -5 L -15 -10" 
          fill="url(#navyBlue)"/>
    
    <!-- Right leg of M -->
    <path d="M 22 -20 L 22 20 L 15 20 L 15 -5 L 15 -10" 
          fill="url(#navyBlue)"/>
    
    <!-- Center V of M -->
    <path d="M -15 -10 L 0 8 L 15 -10 L 15 -5 L 0 12 L -15 -5 Z" 
          fill="url(#navyBlue)"/>
    
    <!-- Curved wings -->
    <path d="M -22 -20 Q -30 -25 -35 -22 Q -32 -24 -28 -20" 
          fill="url(#navyBlue)"/>
    <path d="M 22 -20 Q 30 -25 35 -22 Q 32 -24 28 -20" 
          fill="url(#navyBlue)"/>
    
    <!-- Globe at top center -->
    <g transform="translate(0, -28)">
      <!-- Globe circle -->
      <circle cx="0" cy="0" r="9" fill="none" stroke="url(#navyBlue)" stroke-width="1.5"/>
      
      <!-- Horizontal lines (latitude) -->
      <line x1="-9" y1="0" x2="9" y2="0" stroke="url(#navyBlue)" stroke-width="1"/>
      <line x1="-7" y1="-4.5" x2="7" y2="-4.5" stroke="url(#navyBlue)" stroke-width="0.8"/>
      <line x1="-7" y1="4.5" x2="7" y2="4.5" stroke="url(#navyBlue)" stroke-width="0.8"/>
      
      <!-- Vertical lines (longitude) -->
      <ellipse cx="0" cy="0" rx="4.5" ry="9" fill="none" stroke="url(#navyBlue)" stroke-width="1"/>
      <line x1="0" y1="-9" x2="0" y2="9" stroke="url(#navyBlue)" stroke-width="1"/>
    </g>
  </g>
</svg>
